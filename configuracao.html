<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - VisãoEPI Pro</title>
    <link rel="stylesheet" href="sistema_de_epis.css">
    <script src="sistema_de_epis.js" defer></script>
</head>
<body data-page="settings">
    <aside id="sidebar">
        <div class="sidebar-header">VisãoEPI Pro</div>
        <ul class="nav-menu">
            <li><a class="nav-item" data-page="dashboard" href="dashboard.html">Dashboard</a></li>
            <li><a class="nav-item" data-page="mapping" href="mapeamento.html">Mapeamento</a></li>
            <li><a class="nav-item" data-page="ppe-control" href="controle-de-epis.html">Controle de EPIs</a></li>
            <li><a class="nav-item" data-page="inventory" href="inventario.html">Inventário (Logs)</a></li>
            <li><a class="nav-item" data-page="settings" href="configuracao.html">Configurações</a></li>
            <li><a class="nav-item logout" href="login.html" onclick="logout(); return false;">Sair</a></li>
        </ul>
    </aside>

    <main id="main-content">
        <section class="page active">
            <h1>Configurações do Sistema</h1>

            <div class="card">
                <h2>Interface e Acessibilidade</h2>
                <div style="display: flex; align-items: center; justify-content: space-between; max-width: 400px; margin-top: 20px; gap: 16px;">
                    <span><strong>Modo Escuro</strong> <br><small class="text-muted">Aplica a paleta noturna</small></span>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="card">
                <h2>Idioma e Região</h2>
                <div class="form-group" style="max-width: 400px;">
                    <label>Idioma do Sistema</label>
                    <select id="lang-select">
                        <option value="en">Inglês (English)</option>
                        <option value="es">Espanhol (Español)</option>
                        <option value="fr">Francês (Français)</option>
                    </select>
                </div>
                <div class="form-group" style="max-width: 400px;">
                    <label>Fuso Horário (Timezone)</label>
                    <select id="tz-select">
                        <option>UTC-5 (New York, Bogotá)</option>
                        <option selected>UTC-3 (São Paulo, Buenos Aires)</option>
                        <option>UTC+1 (Paris, Madrid)</option>
                    </select>
                </div>
                <button class="btn">Salvar Preferências</button>
            </div>

            <div class="card">
                <h2>Notificações</h2>
                <label style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="checkbox" checked> Receber alertas de EPI crítico via Email
                </label>
                <label style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="checkbox"> Ativar sirene do setor em caso de infração grave
                </label>
            </div>
        </section>
    </main>
</body>
</html>
